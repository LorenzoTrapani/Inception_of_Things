apiVersion: apps/v1
kind: Deployment
metadata:
  name: wil-playground
  namespace: dev
spec:
  selector:
    matchLabels:
      app: #?
  template:
    metadata:
      labels:
        app: #?
    spec:
      containers:
      - name: wil-container
        image: wil42/playground:v2
        ports:
        - containerPort: 8888
        resources: #?
---
apiVersion: v1
kind: Service
metadata:
  name: wil-playground
  namespace: dev
spec:
  type: NodePort
  selector:
    app: wil-playground
  ports:
  - protocol: TCP
    port: 8888
    targetPort: 8888
    nodePort: 30420
